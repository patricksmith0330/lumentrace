services:
  lumentrace:
    image: pwsmith1988/lumentrace:2.0.0
    container_name: lumentrace
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-America/New_York}
      DATA_DIR: /data
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    network_mode: host
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
