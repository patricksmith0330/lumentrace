{% extends "_base.html" %}
{% block title %}Sign in · LumenTrace{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Protected access</p>
    <h1>Welcome back</h1>
    <p class="auth-card__intro">Sign in to monitor and recover your network.</p>
    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ next_url or '' }}">
      <label class="field">
        <span>Username</span>
        <input name="username" autocomplete="username" maxlength="64" required autofocus>
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" maxlength="128" required>
      </label>
      <button class="button button--primary button--wide" type="submit">Sign in</button>
    </form>
  </div>
</section>
{% endblock %}
