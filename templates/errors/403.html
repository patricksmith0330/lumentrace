{% extends "_base.html" %}
{% block title %}Access denied · LumenTrace{% endblock %}
{% block content %}
<div class="narrow-page">
  <section class="auth-card error-card">
    <p class="eyebrow">Read-only access</p>
    <h1>Administrator required</h1>
    <p class="auth-card__intro">Your account can monitor LumenTrace, but it cannot change devices, UPS connections, settings, or users.</p>
    <a class="button button--primary" href="{% url 'dashboard' %}">Return to monitor</a>
  </section>
</div>
{% endblock %}
