name: Publish v3 beta

on:
  push:
    branches: ["beta/v3"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: github-actions-security-check-key
      DATA_DIR: /tmp
      ALLOWED_HOSTS: localhost
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: PYTHONPATH=. pytest -q
      - run: python -m compileall -q manage.py config.py models.py lumentrace core services utils
      - run: python manage.py check

  publish:
    needs: test
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Require Docker Hub credentials
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          echo "::error::Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
          exit 1
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: pwsmith1988/lumentrace
          tags: |
            type=raw,value=v3
            type=raw,value=v3-beta
          labels: |
            org.opencontainers.image.version=3.0.0-beta.${{ github.run_number }}
            org.opencontainers.image.description=LumenTrace v3 Django security beta
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=3.0.0-beta.${{ github.run_number }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=v3-beta
          cache-to: type=gha,mode=max,scope=v3-beta
          provenance: mode=max
          sbom: true
