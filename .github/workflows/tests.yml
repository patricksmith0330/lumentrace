name: Tests

on:
  pull_request:
  push:
    branches: [main, beta/v3]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: github-actions-security-check-key
      DATA_DIR: /tmp
      ALLOWED_HOSTS: localhost
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: PYTHONPATH=. pytest -q
      - run: python -m compileall -q manage.py config.py models.py lumentrace core services utils
      - run: python manage.py check

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lumentrace:test
